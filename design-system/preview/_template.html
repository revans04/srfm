<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 24px; background: var(--sr-surface); }
  .card-root { font-family: var(--sr-font-sans); color: var(--sr-fg-1); }
  .row { display: flex; align-items: center; gap: 16px; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
</style>
</head><body><div class="card-root" id="root"></div></body></html>
